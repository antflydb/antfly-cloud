# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: oapi
output: oapi/client.gen.go
generate:
  embedded-spec: true
  models: true
  client: true
compatibility:
  always-prefix-enum-values: true
output-options:
  include-operation-ids:
    - getCurrentUser
    - listOrganizations
    - getOrganization
    - listOrganizationMembers
    - inviteOrganizationMember
    - updateMemberRole
    - updateMemberMetadata
    - removeOrganizationMember
    - revokeInvitation
    - resendInvitation
    - listCloudInstances
    - getCloudInstance
    - updateCloudInstance
    - getCloudInstanceConnection
    - listCloudInstanceEvents
    - getCloudInstanceMetrics
    - getCloudUsage
    - listCloudGroups
    - createCloudGroup
    - updateCloudGroup
    - getCloudUserAttributes
    - updateCloudUserAttributes
    - syncCloudSCIMGroups
    - listCloudGroupMembers
    - addCloudGroupMember
    - removeCloudGroupMember
    - listCloudGrants
    - upsertCloudGrant
    - deleteCloudGrant
  prefer-skip-optional-pointer: true
  prefer-skip-optional-pointer-with-omitzero: true
