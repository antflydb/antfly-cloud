        new_password:
          type: string
          format: password
          minLength: 15
    SetPasswordRequest:
      type: object
      required:
        - new_password
      properties:
        new_password:
          type: string
          format: password
          minLength: 15
    ChangeEmailRequest:
      type: object
      required:
        - new_email
        - password
      properties:
        new_email:
          type: string
          format: email
        password:
          type: string
          format: password
    ConfirmEmailChangeRequest:
