      type: object
      required:
        - enabled
        - backup_codes
      properties:
        enabled:
          type: boolean
        backup_codes:
          type: array
          items:
            type: string
    TwoFactorDisableRequest:
      type: object
      required:
        - password
        - code
      properties:
        password:
          type: string
          format: password
        code:
          type: string
          pattern: ^\d{6}$
    RegenerateBackupCodesRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          format: password
    BackupCodesResponse:
      type: object
      required:
        - backup_codes
      properties:
