          example: v0.2.0
        current_antfly_image:
          type: string
          nullable: true
          description: Currently healthy Antfly runtime image.
        current_antfly_image_digest:
          type: string
          nullable: true
          description: Immutable digest for the current Antfly runtime image when known.
        target_antfly_version:
          type: string
          nullable: true
          description: Target Antfly runtime version for an in-progress or manual rollout.
          example: v0.2.1
        target_antfly_image:
          type: string
          nullable: true
          description: Target Antfly runtime image for an in-progress or manual rollout.
        target_antfly_image_digest:
          type: string
          nullable: true
          description: Immutable digest for the target Antfly runtime image when known.
        version_upgrade_status:
          $ref: '#/components/schemas/CloudInstanceVersionUpgradeStatus'
        version_upgrade_error:
          type: string
          nullable: true
          description: Error from the last Antfly runtime rollout.
        version_upgrade_started_at:
          $ref: '#/components/schemas/Timestamp'
        version_upgrade_completed_at:
          $ref: '#/components/schemas/Timestamp'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    CreateCloudInstanceRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Display name
          example: My Production DB
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
          description: URL-safe identifier (immutable, lowercase, alphanumeric + hyphens)
          example: my-production-db
        region:
          type: string
          description: Deployment region (defaults to us-central1)
          example: us-central1
        tier:
          $ref: '#/components/schemas/CloudInstanceTier'
          default: standard
        mode:
          $ref: '#/components/schemas/CloudInstanceMode'
          default: single
        node_config:
          $ref: '#/components/schemas/NodeConfigUpdate'
          description: Optional initial capacity overrides. When omitted, the tier and mode defaults are used.
        version_policy:
          $ref: '#/components/schemas/CloudInstanceVersionPolicy'
          description: Initial Antfly runtime upgrade policy. Defaults to patch_auto.
    CloudInstanceTable:
      type: object
      required:
        - id
        - organization_id
        - cloud_instance_id
        - slug
        - table_name
        - is_default
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        organization_id:
          $ref: '#/components/schemas/UUID'
        cloud_instance_id:
          $ref: '#/components/schemas/UUID'
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?$
          example: events
        table_name:
          type: string
          description: Physical Antfly table name inside the cloud instance.
          example: acme_prod_events
        is_default:
          type: boolean
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    CreateCloudInstanceTableRequest:
      type: object
      required:
        - slug
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?$
          example: events
        is_default:
          type: boolean
          default: false
    UpdateCloudInstanceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: New display name
        mode:
          $ref: '#/components/schemas/CloudInstanceMode'
          description: Change the instance deployment mode. Switching to replicated HA is billed before provisioning.
        tier:
          $ref: '#/components/schemas/CloudInstanceTier'
          description: Change the committed-capacity package baseline.
        node_config:
          $ref: '#/components/schemas/NodeConfigUpdate'
        version_policy:
          $ref: '#/components/schemas/CloudInstanceVersionPolicy'
          description: Change the Antfly runtime upgrade policy.
        target_antfly_version:
          type: string
          description: Explicit Antfly runtime version for a manual rollout or rollback. Requires target_antfly_image.
          example: v0.2.1
        target_antfly_image:
          type: string
          description: Explicit Antfly runtime image for a manual rollout or rollback. When set, Jobsaf patches AntflyCluster.spec.image and health-gates completion.
          example: us-central1-docker.pkg.dev/antfly-image-artifacts/containers/antfly:v0.2.1
        target_antfly_image_digest:
          type: string
          description: Optional immutable digest for the manual target image.
          example: sha256:abc123
        clear_antfly_version_target:
          type: boolean
          description: Clear a pending or failed manual Antfly runtime target without changing the live cluster image.
    NodeConfigUpdate:
      type: object
      description: Node configuration changes for scaling. Split metadata/data node counts apply only to replicated mode; single mode is normalized to one Antfly node.
      properties:
        metadata_nodes:
          type: integer
          minimum: 0
          description: Number of metadata (Raft consensus) nodes for replicated mode; ignored for single mode.
        data_nodes:
          type: integer
          minimum: 1
          description: Number of data (storage) nodes for replicated mode; single mode is always one Antfly node.
        cpu:
          type: string
          description: CPU request per node (e.g., "500m", "1000m")
        memory:
          type: string
          description: Memory request per node (e.g., "4Gi", "8Gi")
        storage:
          type: string
          description: 'Deprecated: use data_storage instead'
          deprecated: true
        metadata_storage:
          type: string
          description: Persistent storage per metadata node (e.g., "2Gi", "5Gi")
        data_storage:
          type: string
          description: Persistent storage per data node (e.g., "10Gi", "50Gi")
        accelerator:
          type: object
          x-go-type-skip-optional-pointer: false
          description: GPU/TPU accelerator configuration
          properties:
            type:
              type: string
              nullable: true
              x-go-type-skip-optional-pointer: false
              description: Accelerator type (e.g., "nvidia-tesla-t4", "nvidia-a100")
            count:
              type: integer
              minimum: 0
              nullable: true
              x-go-type-skip-optional-pointer: false
              description: Number of accelerators per node
    ConnectionDetails:
      type: object
      required:
        - proxy_url
        - dashboard_url
        - antfly_inference_proxy_url
        - status
      properties:
        proxy_url:
          type: string
          format: uri
          description: Colony proxy URL for accessing this instance
          example: https://platform.antfly.io/cloud/v1/abc123-def456
        dashboard_url:
          type: string
          format: uri
          description: Colony dashboard URL for opening the hosted Antfarm UI for this instance
          example: https://platform.antfly.io/cloud/instances/abc123-def456
        antfly_inference_proxy_url:
          type: string
          format: uri
          description: Colony proxy URL for accessing the attached Antfly Inference service for this instance
          example: https://platform.antfly.io/cloud/v1/abc123-def456/ai/v1
        status:
          $ref: '#/components/schemas/CloudInstanceStatus'
    CloudAPIKey:
