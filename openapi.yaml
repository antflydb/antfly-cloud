        - actions
      properties:
        subject_type:
          type: string
          enum:
            - user
            - group
            - cloud_api_key
        subject_id:
          $ref: '#/components/schemas/UUID'
        table_name:
          type: string
          default: '*'
        actions:
          type: array
          minItems: 1
