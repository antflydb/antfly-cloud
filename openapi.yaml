    CloudInstanceStatus:
      type: string
      enum:
        - pending
        - provisioning
        - ready
        - updating
        - degraded
        - suspended
        - deprovisioning
        - deleted
        - failed
      description: Instance lifecycle status
    CloudInstanceVersionPolicy:
      type: string
      enum:
        - pinned
        - patch_auto
        - minor_auto
        - major_manual
      description: Antfly runtime version policy for managed upgrades.
    CloudInstanceVersionUpgradeStatus:
      type: string
      enum:
        - idle
        - pending
        - rolling
        - failed
        - blocked
      description: Antfly runtime rollout status.
    CloudInstanceMode:
      type: string
      enum:
        - single
        - replicated
      description: Cloud deployment topology. `single` provisions one Antfly node; `replicated` provisions separate metadata and data node groups for HA.
    CloudInstanceTier:
      type: string
      enum:
        - starter
        - standard
        - pro
      description: Customer-facing cloud package baseline used for committed-capacity billing.
    CloudAPIKeyType:
      type: string
      enum:
        - read_only
        - read_write
        - admin
      description: API key permission level
    NodeConfig:
      type: object
      description: Cluster node configuration. Split metadata/data node counts apply only to replicated mode; single mode is normalized to one Antfly node.
      properties:
        metadata_nodes:
          type: integer
          minimum: 0
          default: 0
          description: Number of metadata (Raft consensus) nodes for replicated mode; ignored for single mode.
        data_nodes:
          type: integer
          minimum: 1
          default: 1
          description: Number of data (storage) nodes for replicated mode; single mode is always one Antfly node.
        cpu:
          type: string
          description: CPU request per node (e.g., "500m", "1000m")
          example: 500m
        memory:
          type: string
          description: Memory request per node (e.g., "4Gi", "8Gi")
          example: 4Gi
        storage:
          type: string
          description: 'Deprecated: use data_storage instead. Persistent storage per data node.'
          example: 10Gi
          deprecated: true
        metadata_storage:
          type: string
          description: Persistent storage per metadata node (e.g., "2Gi", "5Gi")
          example: 2Gi
        data_storage:
          type: string
          description: Persistent storage per data node (e.g., "10Gi", "50Gi")
          example: 10Gi
        replication_factor:
          type: integer
          minimum: 1
          default: 3
          description: Raft replication factor
        accelerator:
          type: object
          description: GPU/TPU accelerator configuration (reserved for future use)
          properties:
            type:
              type: string
              description: Accelerator type (e.g., "nvidia-tesla-t4", "nvidia-a100")
            count:
              type: integer
              minimum: 1
              description: Number of accelerators per node
    CloudInstance:
      type: object
      required:
        - id
        - organization_id
        - name
        - slug
        - tier
        - mode
        - status
        - region
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        organization_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          description: Display name
          example: My Production DB
        slug:
          type: string
          description: URL-safe identifier (immutable)
          example: my-production-db
        tier:
          $ref: '#/components/schemas/CloudInstanceTier'
        mode:
          $ref: '#/components/schemas/CloudInstanceMode'
        status:
          $ref: '#/components/schemas/CloudInstanceStatus'
        region:
          type: string
          description: Deployment region
          example: us-central1
