  /organizations/{org_id}/subscription/portal:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    post:
      summary: Create billing/checkout session
      description: |
        Smart billing endpoint that automatically routes users based on their subscription status:
        - **Paid plan users** → Redirected to Stripe Billing Portal (manage payment, view invoices, cancel)
        - **Free plan users** → Redirected to Stripe Checkout (upgrade to paid plan)

        The response includes a `type` field indicating which flow was used.
      operationId: createBillingSession
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - return_url
              properties:
                return_url:
                  type: string
                  format: uri
                  description: URL to return to after session completes
                  example: https://platform.antfly.io/settings/billing
                plan:
                  type: string
                  enum:
                    - growth
                    - enterprise
                  description: |
                    Plan to upgrade to (only used for free plan users).
                    Defaults to "growth" if not specified.
                  example: growth
                intent:
                  type: string
                  enum:
                    - setup_payment_method
                    - start_subscription
                    - manage_billing
                  description: Billing action requested by the caller. Defaults to smart routing.
                  example: setup_payment_method
      responses:
        '200':
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                  - type
                properties:
                  url:
                    type: string
                    format: uri
                    description: Redirect URL for Stripe session
                    example: https://checkout.stripe.com/c/pay/cs_test_...
                  type:
                    type: string
                    enum:
                      - portal
                      - checkout
                      - setup
                    description: Type of session created
                    example: checkout
              examples:
                checkout:
                  summary: Free user upgrade flow
                  value:
                    url: https://checkout.stripe.com/c/pay/cs_test_...
                    type: checkout
                portal:
                  summary: Paid user billing portal
                  value:
                    url: https://billing.stripe.com/p/session/test_...
                    type: portal
                setup:
                  summary: Payment method setup flow
                  value:
                    url: https://checkout.stripe.com/c/setup/cs_test_...
                    type: setup
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
