openapi: 3.0.3
info:
  title: Antfly Cloud Platform API
  description: Public management APIs for Antfly Cloud organizations, billing, authentication, hosted instances, Cloud RBAC, backups, metrics, and usage.
  version: 1.0.0
  contact:
    name: Antfly Cloud Support
    url: https://platform.antfly.io
  license:
    name: Proprietary
servers:
  - url: https://platform.antfly.io/api/v1
    description: Production
tags:
  - name: Users
    description: User account management
    x-displayName: Users
  - name: Organizations
    description: Organization management
    x-displayName: Organizations
  - name: Audit
    description: Audit log access
    x-displayName: Audit
  - name: Authentication
    x-displayName: Authentication
  - name: Subscriptions
    description: Subscription management
    x-displayName: Subscriptions
  - name: Billing
    description: Billing state and entitlement decisions
    x-displayName: Billing
  - name: Usage
    description: Usage tracking and quotas
    x-displayName: Usage
  - name: Instances
    description: Cloud instance lifecycle management
    x-displayName: Instances
  - name: CloudAPIKeys
    description: API key management for cloud instances
    x-displayName: CloudAPIKeys
  - name: CloudTables
    description: Logical table registry for cloud instances
    x-displayName: CloudTables
  - name: CloudMetrics
    description: Instance metrics and events
    x-displayName: CloudMetrics
  - name: CloudBackups
    description: Backup and restore management for cloud instances
    x-displayName: CloudBackups
  - name: CloudRBAC
    description: Cloud instance groups and grants
    x-displayName: CloudRBAC
  - name: CloudBilling
    description: Cloud committed-capacity billing and credits
    x-displayName: CloudBilling
  - name: CloudObservability
    description: Observability metrics for cloud instances
    x-displayName: CloudObservability
  - name: Login
    description: Email/password and OAuth login
    x-displayName: Login
  - name: Signup
    description: User registration and email verification
    x-displayName: Signup
  - name: TwoFactor
    description: Two-factor authentication setup and verification
    x-displayName: TwoFactor
  - name: Password
    description: Password management (forgot, reset, change, set)
    x-displayName: Password
  - name: Email
    description: Email change flow
    x-displayName: Email
  - name: Profile
    description: User profile and auth methods
    x-displayName: Profile
paths:
  /auth/signout:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    post:
      summary: Sign out user
      description: Clears authentication cookies (access_token and refresh_token)
      operationId: signOut
      tags:
        - Authentication
      security: []
      responses:
        '200':
          description: Successfully signed out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '204':
          description: Successfully signed out, cookies cleared
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/me:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Get current user
      description: Returns authenticated user profile
      operationId: getCurrentUser
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: Update current user
      description: Update authenticated user profile
      operationId: updateCurrentUser
      tags:
        - Users
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                avatar_url:
                  type: string
                  format: uri
                  nullable: true
                settings:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/invitations:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Get pending invitations
      description: List pending invitations for the authenticated user
      operationId: getUserInvitations
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pending invitations list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - invitation_id
                        - token
                        - email
                        - organization_id
                        - organization_name
                        - role
                        - invited_by
                        - invited_at
                        - expires_at
                      properties:
                        invitation_id:
                          $ref: '#/components/schemas/UUID'
                        token:
                          type: string
                          minLength: 64
                          maxLength: 64
                        email:
                          type: string
                          format: email
                        organization_id:
                          $ref: '#/components/schemas/UUID'
                        organization_name:
                          type: string
                        role:
                          type: string
                        invited_by:
                          type: object
                          required:
                            - user_id
                            - display_name
                          properties:
                            user_id:
                              $ref: '#/components/schemas/UUID'
                            display_name:
                              type: string
                        invited_at:
                          $ref: '#/components/schemas/Timestamp'
                        expires_at:
                          $ref: '#/components/schemas/Timestamp'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /organizations/check-slug:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Check organization slug availability
      description: Check if an organization slug is available and get suggestions if not
      operationId: checkOrganizationSlug
      tags:
        - Organizations
      security: []
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
            pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
          description: The slug to check
      responses:
        '200':
          description: Slug availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlugCheckResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /organizations:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: List organizations
      description: List organizations where user is a member
      operationId: listOrganizations
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Organizations list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create organization
      description: Create new organization (user becomes owner)
      operationId: createOrganization
      tags:
        - Organizations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
                - billing_email
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                slug:
                  type: string
                  pattern: ^[a-z0-9-]+$
                  minLength: 1
                  maxLength: 50
                billing_email:
                  type: string
                  format: email
                settings:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /organizations/{org_id}:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Get organization
      description: Get organization details
      operationId: getOrganization
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update organization
      description: Update organization (requires admin+ role)
      operationId: updateOrganization
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                billing_email:
                  type: string
                  format: email
                settings:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete organization
      description: Delete organization (requires owner role)
      operationId: deleteOrganization
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '204':
          description: Organization deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/members:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: List organization members
      description: List all members of organization
      operationId: listOrganizationMembers
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Members list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrganizationMember'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Invite member
      description: Invite user to organization (requires admin+ role)
      operationId: inviteOrganizationMember
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: '#/components/schemas/OrganizationRole'
      responses:
        '201':
          description: Member invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse-2'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/members/{member_id}:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    patch:
      summary: Update member role
      description: Update organization member role (requires admin+ role, cannot change owner)
      operationId: updateMemberRole
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum:
                    - admin
                    - developer
                  description: New role for the member (cannot set to owner via this endpoint)
      responses:
        '200':
          description: Member role updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - user_id
                  - organization_id
                  - role
                  - updated_at
                properties:
                  user_id:
                    $ref: '#/components/schemas/UUID'
                  organization_id:
                    $ref: '#/components/schemas/UUID'
                  role:
                    type: string
                  updated_at:
                    $ref: '#/components/schemas/Timestamp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Remove member
      description: Remove user from organization (requires admin+ role)
      operationId: removeOrganizationMember
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/MemberId'
      responses:
        '204':
          description: Member removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/members/{member_id}/metadata:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    patch:
      summary: Update member metadata
      description: Replace organization-scoped metadata for a member's role context.
      operationId: updateMemberMetadata
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - metadata
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Member metadata updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /organizations/{org_id}/transfer-ownership:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    post:
      summary: Transfer organization ownership
      description: Transfer organization ownership to another admin (requires owner role + password confirmation or OAuth re-authentication)
      operationId: transferOrganizationOwnership
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_owner_id
              properties:
                new_owner_id:
                  $ref: '#/components/schemas/UUID'
                  description: User ID of the new owner (must be an admin)
                password:
                  type: string
                  format: password
                  description: Current owner's password for confirmation (required if not using reauth_verified)
                reauth_verified:
                  type: boolean
                  description: Set to true after OAuth re-authentication (alternative to password)
      responses:
        '200':
          description: Ownership transferred successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - organization_id
                  - old_owner_id
                  - new_owner_id
                  - transferred_at
                properties:
                  organization_id:
                    $ref: '#/components/schemas/UUID'
                  old_owner_id:
                    $ref: '#/components/schemas/UUID'
                  new_owner_id:
                    $ref: '#/components/schemas/UUID'
                  transferred_at:
                    $ref: '#/components/schemas/Timestamp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /invitations/{token}:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Get invitation details
      description: Retrieve invitation details by token (public endpoint)
      operationId: getInvitation
      tags:
        - Organizations
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Invitation token
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInvitationResponse-2'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Revoke invitation
      description: Revoke an invitation token (requires authentication - only inviter or org admin/owner can revoke)
      operationId: revokeInvitation
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Invitation token
      responses:
        '204':
          description: Invitation revoked successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /invitations/{token}/accept:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    post:
      summary: Accept invitation
      description: Accept an invitation token and create membership (requires authenticated user)
      operationId: acceptInvitation
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Invitation token
      responses:
        '200':
          description: Invitation accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInvitationResponse-2'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /invitations/{token}/resend:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    post:
      summary: Resend invitation
      description: Resend invitation email with a new token (requires authentication - only inviter or org admin/owner can resend)
      operationId: resendInvitation
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Original invitation token
      responses:
        '200':
          description: Invitation resent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendInvitationResponse-2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /organizations/{org_id}/audit-logs:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: List audit logs
      description: List audit logs for organization (requires admin+ role)
      operationId: listAuditLogs
      tags:
        - Audit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: entity_type
          in: query
          schema:
            $ref: '#/components/schemas/EntityType'
        - name: entity_id
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - name: action
          in: query
          schema:
            $ref: '#/components/schemas/AuditAction'
      responses:
        '200':
          description: Audit logs list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/billing/state:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: Get billing state
      description: Get normalized billing state, including plan, limits, and entitlement decisions.
      operationId: getBillingState
      tags:
        - Billing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Billing state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/billing/credit-ledger:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: List credit ledger entries
      description: Get credit ledger entries for an organization, newest first.
      operationId: getCreditLedger
      tags:
        - Billing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - name: product_family
          in: query
          schema:
            type: string
          description: Optional product-family filter, for example `ai`
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Credit ledger entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCreditLedgerList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{org_id}/billing/spend-limits:
    servers:
      - url: https://platform.antfly.io/api/v1
        description: Production
    get:
      summary: List spend limits
      description: Get configured spend limits for an organization.
      operationId: getSpendLimits
      tags:
        - Billing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Spend limits
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
